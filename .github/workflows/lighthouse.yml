name: Lighthouse CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Build frontend
        run: npm run frontend:build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BASE_PATH: /

      - name: Start preview server
        run: |
          npm --prefix frontend run preview -- --host 127.0.0.1 --port 4173 > /tmp/vite-preview.log 2>&1 &
          echo $! > /tmp/vite-preview.pid

      - name: Wait for preview server
        run: |
          for i in $(seq 1 60); do
            if curl -sSf http://127.0.0.1:4173/ > /dev/null; then
              echo "Preview server is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not become ready in time."
          cat /tmp/vite-preview.log || true
          exit 1

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://127.0.0.1:4173/
          runs: 3
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Add Lighthouse URLs to job summary
        run: |
          echo "## Lighthouse Temporary Public Reports" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.lighthouse.outputs.links }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/vite-preview.pid ]; then
            kill "$(cat /tmp/vite-preview.pid)" || true
          fi
